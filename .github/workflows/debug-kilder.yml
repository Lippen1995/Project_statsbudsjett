name: Debug – inspiser datakilder

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/debug-kilder.yml'

jobs:
  inspiser:
    runs-on: ubuntu-latest
    env:
      UA: "statsbudsjett-visualisering/1.0 (+https://github.com/Lippen1995/Project_statsbudsjett; åpne data)"
    steps:
      - name: robots.txt for begge nettsteder
        run: |
          for host in www.regjeringen.no www.statsbudsjettet.no; do
            echo "==================== robots.txt: $host ===================="
            curl -s -A "$UA" "https://$host/robots.txt" -w "\n[HTTP %{http_code}]\n" | head -c 1500
            echo ""
          done

      - name: Ærlig henting med skikkelig User-Agent
        run: |
          echo "=== regjeringen.no forside ==="
          curl -s -A "$UA" -H "Accept: text/html" -w "HTTP %{http_code} | %{size_download} bytes | %{content_type}\n" \
            "https://www.regjeringen.no/no/id4/" -o /tmp/reg.html
          head -c 200 /tmp/reg.html; echo; echo "---"

          echo "=== regjeringen.no – Prop 1 S (statsbudsjettet) tema-side ==="
          curl -s -A "$UA" -H "Accept: text/html" -w "HTTP %{http_code} | %{size_download} bytes\n" \
            "https://www.regjeringen.no/no/tema/okonomi-og-budsjett/norsk_okonomi/statsbudsjettet/id1437/" -o /tmp/tema.html
          grep -oiE 'href="[^"]*(statsbudsjett|prop|id[0-9]+)[^"]*"' /tmp/tema.html | sort -u | head -15 || echo "  ingen lenker"

          echo "=== statsbudsjettet.no forside ==="
          curl -s -A "$UA" -H "Accept: text/html" -w "HTTP %{http_code} | %{size_download} bytes | %{content_type}\n" \
            "https://www.statsbudsjettet.no" -o /tmp/sb.html
          head -c 200 /tmp/sb.html; echo
          grep -oiE '(href|src)="[^"]*(api|\.json|budsjett|kapittel)[^"]*"' /tmp/sb.html | sort -u | head -20 || echo "  ingen data-lenker"
