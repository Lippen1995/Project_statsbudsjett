name: Debug – inspiser datakilder

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/debug-kilder.yml'

jobs:
  inspiser:
    runs-on: ubuntu-latest
    steps:
      - name: data.stortinget.no – åpent API for proposisjoner/budsjett
        run: |
          echo "=== Sesjoner ==="
          curl -s "https://data.stortinget.no/eksport/sesjoner?format=json" | head -c 600; echo; echo "---"
          echo "=== Saker i inneværende sesjon (budsjett?) — søk ==="
          curl -s "https://data.stortinget.no/eksport/saker?sesjonid=2024-2025&format=json" -o /tmp/saker.json
          echo "HTTP-størrelse: $(wc -c < /tmp/saker.json) bytes"
          python3 -c "
          import json
          d=json.load(open('/tmp/saker.json'))
          print('toppnøkler:', list(d.keys())[:10])
          saker = d.get('saker_liste') or []
          bud = [s for s in saker if 'budsjett' in (s.get('tittel','') or '').lower()][:8]
          for s in bud:
              print('  ', s.get('id'), '|', (s.get('tittel','')[:80]))
          " 2>/dev/null || head -c 800 /tmp/saker.json

      - name: statsbudsjettet.no – finnes strukturert data/API?
        run: |
          echo "=== statsbudsjettet.no forside (leter etter api/data/json-lenker) ==="
          curl -sL "https://www.statsbudsjettet.no" -o /tmp/sb.html -w "HTTP %{http_code}, %{size_download} bytes, %{content_type}\n"
          grep -oiE '(href|src)="[^"]*"' /tmp/sb.html | grep -iE 'api|\.json|data|last.?ned|download|export' | sort -u | head -30 || echo "  ingen åpenbare data-lenker"
          echo "--- script-bundler (SPA?) ---"
          grep -oiE 'src="[^"]*\.js[^"]*"' /tmp/sb.html | sort -u | head -10 || true

      - name: regjeringen.no – Prop 1 S dokument-API
        run: |
          echo "=== regjeringen.no søk-API for statsbudsjett-dokumenter ==="
          curl -s -w "\nHTTP %{http_code}\n" \
            "https://www.regjeringen.no/no/dokument/dep/fin/proposisjonar-og-meldingar/proposisjonar-til-stortinget/id1753/?term=Prop.%201%20S" \
            -o /tmp/reg.html
          echo "størrelse: $(wc -c < /tmp/reg.html) bytes"
          grep -oiE 'href="[^"]*prop[^"]*"' /tmp/reg.html | sort -u | head -15 || echo "  ingen prop-lenker funnet"
