name: Debug – inspiser datakilder

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/debug-kilder.yml'

jobs:
  inspiser:
    runs-on: ubuntu-latest
    steps:
      - name: Rå metadata for KPI (03013) og BNP (09189)
        run: |
          for t in 03013 09189; do
            echo "==================== RÅ TABELL $t (første 2500 tegn) ===================="
            curl -s "https://data.ssb.no/api/v0/no/table/$t" | head -c 2500
            echo ""
            echo "-------- topp-nøkler + variabler (robust) --------"
            curl -s "https://data.ssb.no/api/v0/no/table/$t" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          print('TOPPNØKLER:', list(d.keys()))
          vars = d.get('variables') or (d.get('metadata') or {}).get('variables') or []
          for v in vars:
              code = v.get('code') or v.get('id')
              print(f'  VAR {code} (elim={v.get(\"elimination\")}):')
              vals = v.get('values') or list((v.get('category') or {}).get('index') or [])
              txts = v.get('valueTexts') or list(((v.get('category') or {}).get('label') or {}).values())
              for val, txt in list(zip(vals, txts))[:6]:
                  print(f'      {val} = {txt}')
              print(f'      (... {len(vals)} verdier)')
          "
            echo ""
          done
