name: Debug – inspiser datakilder

# Kjøres kun manuelt (Actions-fanen → Run workflow). Brukes til å inspisere
# faktiske SSB-/DFØ-metadata når skjema eller API-endepunkter endrer seg.
on:
  workflow_dispatch:

jobs:
  inspiser:
    runs-on: ubuntu-latest
    steps:
      - name: Sjekk SSB-tabeller (v0 metadata)
        run: |
          for t in 07459 03013 09189; do
            code=$(curl -s -o /tmp/r.json -w "%{http_code}" "https://data.ssb.no/api/v0/no/table/$t")
            echo "$t -> HTTP $code"
            head -c 400 /tmp/r.json; echo; echo "---"
          done
