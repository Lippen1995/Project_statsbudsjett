name: Debug – inspiser datakilder

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/debug-kilder.yml'

jobs:
  kostra:
    runs-on: ubuntu-latest
    steps:
      - name: Søk i SSB-tabellkatalogen etter KOSTRA-tabeller
        run: |
          python3 - <<'PY'
          import json, urllib.request, urllib.error, urllib.parse

          def hent(url):
              req = urllib.request.Request(url, headers={
                  "User-Agent": "statsbudsjett-visualisering/1.0 (probe)",
                  "Accept": "application/json",
              })
              with urllib.request.urlopen(req, timeout=60) as r:
                  return r.status, r.read()

          # v2-beta har tabellsøk. Prøv flere spørringer for å finne KOSTRA-tabeller.
          for q in ["KOSTRA", "kommuneregnskap", "regnskap funksjon", "detaljerte regnskapstall"]:
              url = ("https://data.ssb.no/api/pxwebapi/v2-beta/tables"
                     f"?query={urllib.parse.quote(q)}&lang=no&pageSize=40")
              print(f"\n=== SØK: '{q}' ===\n{url}")
              try:
                  status, body = hent(url)
                  print("HTTP", status)
                  if status != 200:
                      print(body[:500].decode("utf-8", "replace")); continue
                  d = json.loads(body)
                  tabeller = d.get("tables") or d.get("data") or []
                  print(f"treff: {len(tabeller)}")
                  for t in tabeller[:40]:
                      tid = t.get("id") or t.get("tableId")
                      label = t.get("label") or t.get("title") or ""
                      periode = t.get("firstPeriod","?"), t.get("lastPeriod","?")
                      print(f"  {tid:>8}  {label[:80]}  [{periode[0]}–{periode[1]}]")
              except Exception as e:
                  print("FEIL:", type(e).__name__, e)
          PY
        continue-on-error: true

      - name: Dump metadata for KOSTRA-kandidattabeller (v0)
        run: |
          python3 - <<'PY'
          import json, urllib.request

          def hent(url):
              req = urllib.request.Request(url, headers={
                  "User-Agent": "statsbudsjett-visualisering/1.0 (probe)",
                  "Accept": "application/json",
              })
              with urllib.request.urlopen(req, timeout=60) as r:
                  return r.status, r.read()

          # Sterke kandidater for «enhet → funksjon → art → beløp over år».
          # Vi PRØVER dem — de som ikke finnes gir HTTP-feil som logges.
          kandidater = [
              "12134",  # Detaljerte regnskapstall driftsregnskapet (kommune)
              "12135",  # Detaljerte regnskapstall investeringsregnskapet (kommune)
              "12167",  # drift, kommunekonsern (?)
              "11805", "11806",
              "12362", "12363",  # fylkeskommune (?)
              "12367",  # finansielle nøkkeltall (?)
              "13924", "13925",
          ]
          for tid in kandidater:
              url = f"https://data.ssb.no/api/v0/no/table/{tid}"
              print(f"\n{'='*70}\n=== TABELL {tid} ===\n{url}")
              try:
                  status, body = hent(url)
                  print("HTTP", status)
                  if status != 200:
                      print(body[:400].decode("utf-8","replace")); continue
                  md = json.loads(body)
                  print("TITTEL:", md.get("title",""))
                  for v in md.get("variables", []):
                      code = v.get("code"); text = v.get("text","")
                      elim = v.get("elimination", False)
                      vals = v.get("values", []); txts = v.get("valueTexts", [])
                      print(f"\n  VAR {code!r} ({text}) elimination={elim} n={len(vals)}")
                      for val, t in list(zip(vals, txts))[:12]:
                          print(f"      {val!r} = {t}")
                      if len(vals) > 12:
                          print(f"      … ({len(vals)-12} flere)")
              except Exception as e:
                  print("FEIL:", type(e).__name__, e)
          PY
        continue-on-error: true

      - name: Testspørring mot beste kandidat (12134) – én kommune, alle år
        run: |
          python3 - <<'PY'
          import json, urllib.request, urllib.error

          tid = "12134"
          url = f"https://data.ssb.no/api/v0/no/table/{tid}"
          req = urllib.request.Request(url, headers={
              "User-Agent": "statsbudsjett-visualisering/1.0 (probe)",
              "Accept": "application/json"})
          try:
              with urllib.request.urlopen(req, timeout=60) as r:
                  md = json.loads(r.read())
          except Exception as e:
              print("Kunne ikke hente metadata:", e); raise SystemExit(0)

          # Bygg minimal spørring: Region=0301 (Oslo) hvis finnes ellers første,
          # Funksjon+Art: første verdi, ContentsCode: første, Tid: alle.
          query = []
          for v in md.get("variables", []):
              code = v["code"]; vals = v["values"]; txts = v["valueTexts"]
              if code == "Tid":
                  query.append({"code":"Tid","selection":{"filter":"all","values":["*"]}})
              elif code.lower() in ("region","regionkommfyl","komnr"):
                  valgt = "0301" if "0301" in vals else vals[0]
                  query.append({"code":code,"selection":{"filter":"item","values":[valgt]}})
                  print(f"  Region-dim {code!r}: valgte {valgt!r}")
              else:
                  query.append({"code":code,"selection":{"filter":"item","values":[vals[0]]}})
                  print(f"  {code!r}: {vals[0]!r} ({txts[0]})")

          payload = {"query": query, "response": {"format": "json-stat2"}}
          req = urllib.request.Request(url, data=json.dumps(payload).encode(),
              headers={"Content-Type":"application/json",
                       "User-Agent":"statsbudsjett-visualisering/1.0 (probe)"})
          try:
              with urllib.request.urlopen(req, timeout=120) as r:
                  print("HTTP", r.status)
                  d = json.loads(r.read())
                  print("Dimensjoner:", list(d.get("dimension",{}).keys()))
                  print("Antall verdier:", len(d.get("value",[])))
                  print("Enhet(er):")
                  for k, dim in d.get("dimension",{}).items():
                      unit = dim.get("category",{}).get("unit")
                      if unit: print("   ", k, unit)
                  print("Første 8 verdier:", d.get("value",[])[:8])
          except urllib.error.HTTPError as e:
              print("HTTP-FEIL", e.code)
              print(e.read()[:600].decode("utf-8","replace"))
          except Exception as e:
              print("FEIL:", type(e).__name__, e)
          PY
        continue-on-error: true
