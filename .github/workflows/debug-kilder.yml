name: Debug – inspiser datakilder

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/debug-kilder.yml'

jobs:
  inspiser:
    runs-on: ubuntu-latest
    steps:
      - name: Kolonnebeskrivelser
        run: |
          echo "=== statsregnskapet_beskrivelse_av_kolonner.csv ==="
          curl -sL "https://statsregnskapet.dfo.no/nedlasting/statsregnskapet_beskrivelse_av_kolonner.csv" | iconv -f latin1 -t utf8 || true
          echo ""
          echo "=== bevilgninger_beskrivelse_av_kolonner.csv ==="
          curl -sL "https://statsregnskapet.dfo.no/nedlasting/bevilgninger_beskrivelse_av_kolonner.csv" | iconv -f latin1 -t utf8 || true

      - name: Last ned og inspiser regnskaps-ZIP for 2023
        run: |
          curl -sL "https://statsregnskapet.dfo.no/nedlasting/statsregnskapet_aar_2023.zip" -o r2023.zip
          echo "--- ZIP-innhold: ---"
          unzip -l r2023.zip
          unzip -o r2023.zip -d r2023/
          for f in r2023/*; do
            echo "=== $f (første 5 linjer, latin1→utf8) ==="
            head -5 "$f" | iconv -f latin1 -t utf8 || head -5 "$f"
            echo "--- antall linjer: $(wc -l < "$f") ---"
          done

      - name: Last ned og inspiser bevilgninger
        run: |
          curl -sL "https://statsregnskapet.dfo.no/nedlasting/bevilgninger_full_historikk.zip" -o bev.zip
          echo "--- ZIP-innhold: ---"
          unzip -l bev.zip
          unzip -o bev.zip -d bev/
          for f in bev/*; do
            echo "=== $f (første 5 linjer) ==="
            head -5 "$f" | iconv -f latin1 -t utf8 || head -5 "$f"
            echo "--- antall linjer: $(wc -l < "$f") ---"
          done

      - name: SSB metadata (kompakt – alle variabler)
        run: |
          curl -s "https://data.ssb.no/api/v0/no/table/07459" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          for v in d['variables']:
              print(v['code'], '| elimination:', v.get('elimination'), '| antall verdier:', len(v['values']), '| første:', v['values'][:3], v['valueTexts'][:3])
          "

      - name: Test SSB-spørring (kun Tid + ContentsCode)
        run: |
          cat > query.json <<'EOF'
          {
            "query": [
              {"code": "Region", "selection": {"filter": "item", "values": ["0"]}},
              {"code": "ContentsCode", "selection": {"filter": "item", "values": ["Personer1"]}},
              {"code": "Tid", "selection": {"filter": "all", "values": ["*"]}}
            ],
            "response": {"format": "json-stat2"}
          }
          EOF
          echo "=== POST med Region=0, ContentsCode=Personer1, Tid=alle ==="
          curl -s -w "\nHTTP %{http_code}\n" -X POST -H "Content-Type: application/json" \
            -d @query.json "https://data.ssb.no/api/v0/no/table/07459" | head -c 2000
