name: ETL – hent og prosesser data

on:
  workflow_dispatch:        # Manuell kjøring fra Actions-fanen
  schedule:
    - cron: '0 6 5 * *'     # Den 5. hver måned kl 06:00 UTC (DFØ oppdaterer månedlig)

permissions:
  contents: write

jobs:
  etl:
    runs-on: ubuntu-latest
    steps:
      - name: Sjekk ut repo
        uses: actions/checkout@v4

      - name: Sett opp Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt

      - name: Installer avhengigheter
        run: pip install -r etl/requirements.txt

      - name: Cache rå nedlastinger
        uses: actions/cache@v4
        with:
          path: etl/raw
          key: etl-raw-${{ github.run_id }}
          restore-keys: |
            etl-raw-

      - name: Kjør enhetstester
        run: python -m pytest etl/tests/ -v

      - name: Kjør ETL
        run: python etl/etl.py

      - name: Vis ETL-logg
        if: always()
        run: cat etl/warnings.log || true

      - name: Commit og push genererte data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Data-mappen er gitignored for lokal utvikling – force-add de genererte filene
          git add -f web/public/data/
          if git diff --cached --quiet; then
            echo "Ingen dataendringer – hopper over commit."
          else
            git commit -m "chore: oppdater data fra DFØ og SSB (automatisk ETL)"
            git push
          fi
