name: Deploy til GitHub Pages

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["ETL – hent og prosesser data"]
    types: [completed]
  push:
    paths:
      - 'web/**'
      - '.github/workflows/deploy.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Ved workflow_run: bare deploy hvis ETL lyktes
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Sjekk ut repo (med evt. ETL-committede data)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref }}

      - name: Konfigurer GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Sett opp Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Installer og bygg
        working-directory: web
        run: |
          npm ci
          # Sjekk at data finnes – uten data er appen tom
          if [ ! -f public/data/meta.json ]; then
            echo "::warning::web/public/data/ mangler – kjør ETL-workflowen først. Deployer likevel (viser feilmelding i appen)."
          fi
          npm run build

      - name: Last opp Pages-artefakt
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy til GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
