name: Deploy til GitHub Pages

on:
  workflow_dispatch:
  workflow_call:        # kjedes fra ETL-workflowen
  push:
    paths:
      - 'web/**'
      - '.github/workflows/deploy.yml'

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Sjekk ut siste versjon av branchen (inkl. ev. ETL-datacommit)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Sett opp Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Installer og bygg
        working-directory: web
        run: |
          npm ci
          if [ ! -f public/data/meta.json ]; then
            echo "::warning::web/public/data/ mangler – kjør ETL-workflowen først."
          fi
          npm run build

      - name: Publiser til gh-pages-branchen
        working-directory: web/dist
        run: |
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "deploy: ${{ github.sha }}"
          git push --force \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" \
            gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
